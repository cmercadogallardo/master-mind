<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mastermind 🧠</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-container">
    <header>
      <h1>🧠 Mastermind</h1>
      <p class="subtitle">Adivina el código secreto de 4 colores</p>
    </header>

    <section class="controls">
      <div id="attempts-counter" class="attempts-counter">Intentos restantes: 10</div>
      <button id="new-game-btn" class="btn-primary">Nueva partida</button>
    </section>

    <div id="message" class="message" style="display:none"></div>

    <!-- Current guess row -->
    <section class="current-guess-section">
      <h2>Tu intento actual</h2>
      <div id="current-guess" class="current-guess">
        <button type="button" class="guess-slot active-slot" data-index="0"></button>
        <button type="button" class="guess-slot" data-index="1"></button>
        <button type="button" class="guess-slot" data-index="2"></button>
        <button type="button" class="guess-slot" data-index="3"></button>
      </div>
      <div class="guess-actions">
        <button id="clear-btn" class="btn-secondary">🗑 Limpiar</button>
        <button id="submit-btn" class="btn-primary">✅ Confirmar</button>
      </div>
    </section>

    <!-- Color picker -->
    <section class="picker-section">
      <h2>Elige un color</h2>
      <div id="color-picker" class="color-picker"></div>
    </section>

    <!-- Board with previous attempts -->
    <section class="board-section">
      <h2>Intentos anteriores</h2>
      <div id="board" class="board"></div>
    </section>
  </div>

  <script src="src/game-logic.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/controller.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
